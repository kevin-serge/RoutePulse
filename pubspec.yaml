name: routepulse
description: A Flutter delivery app project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # Supabase
  supabase_flutter: ^2.8.4

  # Base de données locale
  sqflite: ^2.4.2
  path: ^1.9.1

  # Réseau
  connectivity_plus: ^6.1.4

  # Sécurité auth
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  crypto: ^3.0.6

  # Photos
  image_picker: ^1.2.1

  # Navigation externe (carte)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
